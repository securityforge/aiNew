version: '3.9'

# The scan pipeline runs in-process (daemon threads) inside the backend — there
# is no Redis broker or Celery worker. resume / retry-phase use the same
# in-process pattern as /scan/execute.

services:
  # PostgreSQL — required. The app is Postgres-only.
  # DB_URL in config/.env.dev should point here:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: aipp
      POSTGRES_PASSWORD: aipp
      POSTGRES_DB: aipp
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aipp -d aipp"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - ./config/.env.dev
    volumes:
      - ./mock-data:/app/mock-data
      - ./backend:/app
    # Postgres is optional, so don't hard-require it; when DB_URL targets it,
    # wait until it's healthy before starting.
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  pgdata:
